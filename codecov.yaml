# Codecov Configuration for MonoLab Monorepo
# Documentation: https://docs.codecov.com/docs/codecov-yaml

# Coverage status checks
coverage:
    status:
        # Project coverage (overall repository)
        project:
            default:
                target: auto # Maintain current coverage level
                threshold: 2% # Allow up to 2% coverage decrease (strict but reasonable)
                informational: false # Block PRs if coverage drops significantly

            # Per-package project coverage checks
            react-hooks:
                target: auto
                threshold: 2%
                informational: false
                flags:
                    - react-hooks

            react-clean:
                target: auto
                threshold: 2%
                informational: false
                flags:
                    - react-clean

            ts-configs:
                target: auto
                threshold: 2%
                informational: false
                flags:
                    - ts-configs

            ts-types:
                target: auto
                threshold: 2%
                informational: false
                flags:
                    - ts-types

            http-client:
                target: auto
                threshold: 2%
                informational: false
                flags:
                    - http-client

            qup-api:
                target: auto
                threshold: 2%
                informational: false
                flags:
                    - qup-api

            qup-data:
                target: auto
                threshold: 2%
                informational: false
                flags:
                    - qup-data

            qup-domain:
                target: auto
                threshold: 2%
                informational: false
                flags:
                    - qup-domain

            solid-clean:
                target: auto
                threshold: 2%
                informational: false
                flags:
                    - solid-clean

            wealth-tracker-core:
                target: auto
                threshold: 2%
                informational: false
                flags:
                    - wealth-tracker-core

            green-beard:
                target: auto
                threshold: 2%
                informational: false
                flags:
                    - green-beard

            qup-web:
                target: auto
                threshold: 2%
                informational: false
                flags:
                    - qup-web

            wealth-react:
                target: auto
                threshold: 2%
                informational: false
                flags:
                    - wealth-react

            qup-shared:
                target: auto
                threshold: 2%
                informational: false
                flags:
                    - qup-shared

        # Patch coverage (new/modified code in PRs)
        patch:
            default:
                target: 50% # New code should have at least 50% coverage (low bar for initial setup)
                threshold: 10% # Allow up to 10% below target (40% minimum)
                informational: false # Block PRs with very low coverage on new code

            # Per-package patch coverage checks
            react-hooks:
                target: 50%
                threshold: 10%
                informational: false
                flags:
                    - react-hooks

            react-clean:
                target: 50%
                threshold: 10%
                informational: false
                flags:
                    - react-clean

            ts-configs:
                target: 50%
                threshold: 10%
                informational: false
                flags:
                    - ts-configs

            ts-types:
                target: 50%
                threshold: 10%
                informational: false
                flags:
                    - ts-types

            http-client:
                target: 50%
                threshold: 10%
                informational: false
                flags:
                    - http-client

            qup-api:
                target: 50%
                threshold: 10%
                informational: false
                flags:
                    - qup-api

            qup-data:
                target: 50%
                threshold: 10%
                informational: false
                flags:
                    - qup-data

            qup-domain:
                target: 50%
                threshold: 10%
                informational: false
                flags:
                    - qup-domain

            solid-clean:
                target: 50%
                threshold: 10%
                informational: false
                flags:
                    - solid-clean

            wealth-tracker-core:
                target: 50%
                threshold: 10%
                informational: false
                flags:
                    - wealth-tracker-core

            green-beard:
                target: 50%
                threshold: 10%
                informational: false
                flags:
                    - green-beard

            qup-web:
                target: 50%
                threshold: 10%
                informational: false
                flags:
                    - qup-web

            wealth-react:
                target: 50%
                threshold: 10%
                informational: false
                flags:
                    - wealth-react

            qup-shared:
                target: 50%
                threshold: 10%
                informational: false
                flags:
                    - qup-shared

# Files and directories to ignore from coverage calculations
ignore:
    - "**/*.spec.ts"
    - "**/*.test.ts"
    - "**/*.spec.tsx"
    - "**/*.test.tsx"
    - "**/dist/"
    - "**/node_modules/"
    - "**/coverage/"
    - "**/.nx/"
    - "**/*.config.ts"
    - "**/*.config.tsx"
    - "**/*.config.js"
    - "**/*.config.cjs"
    - "**/*.config.mjs"
    - "**/vite.config.ts"
    - "**/vitest.config.ts"
    - "**/vitest.setup.ts"
    - "**/eslint.config.ts"
    - "**/stryker.config.*"
    - "**/tsdown.config.*"
    - "**/drizzle.config.*"
    - "**/setup.ts"

# Enable inline annotations on pull requests
comment:
    layout: "header, diff, flags, files, footer"
    behavior: default # Update existing comment
    require_changes: false # Always comment, even if no coverage changes

# Per-package flags for independent tracking
flags:
    react-hooks:
        paths:
            - packages/react-hooks/
        carryforward: true # Use previous coverage if not in current upload

    react-clean:
        paths:
            - packages/react-clean/
        carryforward: true

    ts-configs:
        paths:
            - packages/ts-configs/
        carryforward: true

    ts-types:
        paths:
            - packages/ts-types/
        carryforward: true

    http-client:
        paths:
            - packages/http-client/
        carryforward: true

    qup-api:
        paths:
            - apps/qup-api/
        carryforward: true

    qup-data:
        paths:
            - packages/qup-data/
        carryforward: true

    qup-domain:
        paths:
            - packages/qup-domain/
        carryforward: true

    solid-clean:
        paths:
            - packages/solid-clean/
        carryforward: true

    wealth-tracker-core:
        paths:
            - packages/wealth-tracker-core/
        carryforward: true

    green-beard:
        paths:
            - apps/green-beard/
        carryforward: true

    qup-web:
        paths:
            - apps/qup-web/
        carryforward: true

    wealth-react:
        paths:
            - apps/wealth-react/
        carryforward: true

    qup-shared:
        paths:
            - packages/qup-shared/
        carryforward: true
