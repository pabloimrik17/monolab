services:
    postgres:
        image: postgres:17-alpine
        ports:
            - "5433:5432"
        environment:
            POSTGRES_USER: investlab
            POSTGRES_PASSWORD: investlab
            POSTGRES_DB: investlab
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U investlab"]
            interval: 5s
            timeout: 3s
            retries: 5

    redis:
        image: redis:7-alpine
        ports:
            - "6379:6379"
        volumes:
            - redisdata:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 5

volumes:
    pgdata:
    redisdata:
