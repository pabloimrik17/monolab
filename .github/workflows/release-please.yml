name: Release Please

on:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            packages:
                description: "Comma-separated package names to publish (e.g. http-client,react-clean). Required when running manually."
                required: true
                type: string

permissions:
    contents: write
    issues: write
    pull-requests: write
    id-token: write

jobs:
    release-please:
        if: ${{ github.event_name == 'push' }}
        runs-on: ubuntu-latest
        outputs:
            releases_created: ${{ steps.release.outputs.releases_created }}
            paths_released: ${{ steps.release.outputs.paths_released }}
            prs_created: ${{ steps.release.outputs.prs_created }}
            head_branch: ${{ fromJson(steps.release.outputs.pr || '{}').headBranchName }}
        steps:
            - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
              id: release
              with:
                  # Use manifest mode for monorepo
                  config-file: release-please-config.json
                  manifest-file: .release-please-manifest.json
                  # Explicitly target main branch for release PRs
                  target-branch: main

    # release-please round-trips JSON files through JSON.parse/JSON.stringify when
    # updating versions, which expands compact arrays to multi-line (e.g.
    # `["ES2023", "DOM"]` → multi-line). Upstream WONTFIX (release-please#2319).
    # We re-format the release PR with oxfmt so the lint:oxfmt CI check passes.
    prettify-pr:
        needs: release-please
        if: ${{ github.event_name == 'push' && needs.release-please.outputs.prs_created == 'true' && needs.release-please.outputs.head_branch != '' }}
        runs-on: ubuntu-latest
        continue-on-error: true
        permissions:
            contents: write
        env:
            NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
            NX_NO_CLOUD: ${{ vars.NX_NO_CLOUD }}
        steps:
            - name: Checkout release PR branch
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  ref: ${{ needs.release-please.outputs.head_branch }}

            - name: Setup pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
              with:
                  version: 10.27.0

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: "24.12.0"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Apply oxfmt
              run: pnpm exec oxfmt

            - name: Commit and push if changed
              run: |
                  if git diff --quiet; then
                    echo "No formatting changes to commit"
                    exit 0
                  fi
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add -A
                  git commit -m "chore: apply oxfmt to release PR"
                  git push

    publish:
        needs: release-please
        runs-on: ubuntu-latest
        if: |
            always() && !cancelled() &&
            ((github.event_name == 'push' && needs.release-please.outputs.releases_created == 'true')
              || github.event_name == 'workflow_dispatch')
        permissions:
            contents: read
            id-token: write
        env:
            NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
            NX_NO_CLOUD: ${{ vars.NX_NO_CLOUD }}
        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Setup pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
              with:
                  version: 10.27.0

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: "24.12.0"
                  cache: "pnpm"

            - name: Setup Deno
              uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
              with:
                  deno-version: v2.6.4

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Get released packages
              id: released-packages
              env:
                  PATHS_RELEASED: ${{ needs.release-please.outputs.paths_released }}
                  DISPATCH_PACKAGES: ${{ inputs.packages }}
                  EVENT_NAME: ${{ github.event_name }}
              run: |
                  if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
                    # Manual run: read comma-separated input, normalize to space-separated
                    PACKAGES=$(echo "$DISPATCH_PACKAGES" | tr ',' ' ' | tr -s ' ')
                    echo "Manual dispatch packages: $PACKAGES"
                  else
                    # Push event: parse release-please paths_released
                    echo "Released paths: $PATHS_RELEASED"
                    PACKAGES=$(echo "$PATHS_RELEASED" | jq -r '.[] | select(startswith("packages/")) | sub("packages/"; "")' | tr '\n' ' ')
                    echo "Released packages: $PACKAGES"
                  fi

                  echo "packages=$PACKAGES" >> $GITHUB_OUTPUT

            - name: Publish packages to JSR
              run: |
                  # Get list of packages that were released
                  PACKAGES="${{ steps.released-packages.outputs.packages }}"

                  # Generate dependency graph to determine publish order (using --print to avoid creating files)
                  # Filter to only include library projects (excludes demo app) and sort by dependencies
                  ORDERED_PACKAGES=$(pnpm exec nx graph --print 2>/dev/null | jq -r '
                    .graph.dependencies |
                    to_entries |
                    map(select(.key | startswith("@m0n0lab/") and (contains("demo") | not))) |
                    map({
                      pkg: (.key | sub("@m0n0lab/"; "")),
                      deps: (.value | length)
                    }) |
                    sort_by(.deps) |
                    .[].pkg
                  ')

                  echo "Publishing to JSR in dependency order: $ORDERED_PACKAGES"

                  publish_to_jsr() {
                    local pkg_path="$1"
                    local pkg_name="$2"
                    local label="$3"

                    if [ ! -f "$pkg_path/deno.json" ]; then
                      echo "Skipping $label$pkg_name for JSR — no deno.json"
                      return 0
                    fi

                    local version
                    version=$(jq -r '.version' "$pkg_path/deno.json")
                    local meta_url="https://jsr.io/${pkg_name}/${version}_meta.json"

                    if curl -sf -o /dev/null "$meta_url"; then
                      echo "Skipping $label$pkg_name@$version for JSR — already published"
                      return 0
                    fi

                    echo "Publishing $label$pkg_name@$version to JSR..."
                    ( cd "$pkg_path" && deno publish --unstable-sloppy-imports )
                    echo "Successfully published $pkg_name@$version to JSR"
                  }

                  # First publish packages in dependency order (from graph)
                  for PKG_DIR in $ORDERED_PACKAGES; do
                    # Only publish if package was released
                    if echo "$PACKAGES" | grep -q "$PKG_DIR"; then
                      publish_to_jsr "packages/$PKG_DIR" "@m0n0lab/$PKG_DIR" ""
                    fi
                  done

                  # Then publish any remaining packages not in the graph (new packages, standalone packages)
                  for PKG_DIR in $PACKAGES; do
                    # Skip if already published in dependency order
                    if ! echo "$ORDERED_PACKAGES" | grep -q "$PKG_DIR"; then
                      publish_to_jsr "packages/$PKG_DIR" "@m0n0lab/$PKG_DIR" "standalone "
                    fi
                  done

            - name: Build and publish packages to npm
              run: |
                  # Get list of packages
                  PACKAGES="${{ steps.released-packages.outputs.packages }}"

                  # Build and publish all packages to npm
                  for PKG_DIR in $PACKAGES; do
                    PKG_PATH="packages/$PKG_DIR"
                    PACKAGE_NAME="@m0n0lab/$PKG_DIR"

                    if [ ! -d "$PKG_PATH" ]; then
                      echo "Package directory $PKG_PATH not found, skipping..."
                      continue
                    fi

                    VERSION=$(jq -r '.version' "$PKG_PATH/package.json")
                    if npm view "$PACKAGE_NAME@$VERSION" version >/dev/null 2>&1; then
                      echo "Skipping $PACKAGE_NAME@$VERSION for npm — already published"
                      continue
                    fi

                    echo "Processing package: $PACKAGE_NAME@$VERSION"

                    # Build the package using Nx (skip if no build target — e.g. config-only packages)
                    if pnpm exec nx show project "$PACKAGE_NAME" --json 2>/dev/null | jq -e '.targets.build' >/dev/null; then
                      echo "Building $PACKAGE_NAME..."
                      pnpm nx run $PKG_DIR:build
                    else
                      echo "No build target for $PACKAGE_NAME — skipping build"
                    fi

                    # Publish to npm using pnpm (transforms workspace:* to semver)
                    echo "Publishing $PACKAGE_NAME to npm..."
                    ( cd "$PKG_PATH" && pnpm publish --access public )

                    echo "Successfully published $PACKAGE_NAME@$VERSION to npm"
                  done

            - name: Summary
              if: success()
              run: |
                  echo "✅ All packages published successfully!" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "Published packages:" >> $GITHUB_STEP_SUMMARY
                  echo "${{ steps.released-packages.outputs.packages }}" >> $GITHUB_STEP_SUMMARY
