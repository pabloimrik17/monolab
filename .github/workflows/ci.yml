name: CI

on:
    push:
        branches:
            - main
            - pre
            - develop
    pull_request: {}

# Needed for nx-set-shas when run on the main branch
permissions:
    actions: read
    contents: read

jobs:
    main:
        runs-on: ubuntu-latest
        env:
            NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
            # Set to 'true' to disable Nx Cloud when monthly limit is reached
            NX_NO_CLOUD: ${{ vars.NX_NO_CLOUD }}
        outputs:
            # JSON map { "<flag>": true|false } consumed by the upload-codecov matrix job
            # to gate per-package uploads. On push events, all flags are forced to true.
            affected: ${{ steps.affected-codecov.outputs.json }}
        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  filter: tree:0
                  fetch-depth: 0

            - name: Setup pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
              with:
                  version: 10.27.0

            - name: Setup Nodejs
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: 24.12.0
                  # Cache node_modules
                  cache: "pnpm"

            - name: Set Nx SHA
              uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1

            - name: Debug Nx Cloud variable
              run: |
                  echo "NX_NO_CLOUD variable: '${{ vars.NX_NO_CLOUD }}'"
                  echo "NX_NO_CLOUD env: '${{ env.NX_NO_CLOUD }}'"

            # This enables task distribution via Nx Cloud
            # Run this command as early as possible, before dependencies are installed
            # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
            - name: Start Nx Cloud CI Run
              if: ${{ env.NX_NO_CLOUD != 'true' }}
              # --stop-agents-after must match the last distributed target of the run.
              # On push to main/develop the test:mutation step runs after build, so agents
              # must survive past it; on other events mutation is skipped and we stop at build.
              run: |
                  if [ "${{ github.event_name }}" = "push" ] && \
                     { [ "${{ github.ref_name }}" = "main" ] || [ "${{ github.ref_name }}" = "develop" ]; }; then
                    STOP_AFTER="test:mutation"
                  else
                    STOP_AFTER="build"
                  fi
                  pnpm dlx nx-cloud start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="$STOP_AFTER"

            - name: Restore cached npm dependencies
              id: cache-dependencies-restore
              uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: |
                      node_modules
                      ~/.cache/Cypress # needed for the Cypress binary
                  key: npm-dependencies-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      npm-dependencies-${{ runner.os }}-${{ github.ref_name }}-
                      npm-dependencies-${{ runner.os }}-develop-
                      npm-dependencies-${{ runner.os }}-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Cache npm dependencies
              id: cache-dependencies-save
              uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: |
                      node_modules
                      ~/.cache/Cypress # needed for the Cypress binary
                  key: ${{ steps.cache-dependencies-restore.outputs.cache-primary-key }}

            - name: Restore Nx cache
              id: cache-nx-restore
              if: ${{ env.NX_NO_CLOUD == 'true' }}
              uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: .nx
                  key: nx-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('nx.json') }}
                  restore-keys: |
                      nx-${{ runner.os }}-${{ github.ref_name }}-
                      nx-${{ runner.os }}-develop-
                      nx-${{ runner.os }}-

            - name: Restore Stryker incremental cache
              id: cache-stryker-restore
              uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: packages/*/reports/stryker-incremental.json
                  key: stryker-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      stryker-${{ runner.os }}-${{ github.ref_name }}-
                      stryker-${{ runner.os }}-develop-
                      stryker-${{ runner.os }}-

            - name: 🔍 Check monorepo integrity
              run: pnpm exec nx sync:check

            - name: 🔍 Check exports from packages
              run: pnpm exec nx run-many -t build:check-exports

            - name: 🔍 Check for format and lint configs are valid
              run: pnpm exec nx run-many -t lint:eslint:config-check lint:stylelint:config-check:scss

            - name: 🔍 Validate OpenSpec change proposals
              run: pnpm dlx @fission-ai/openspec@1.2.0 validate --changes --no-interactive

            - name: 🔍 Execute lint checks for affected files (Affected)
              run: pnpm exec nx affected -t lint:eslint lint:stylelint lint:markdownlint lint:oxfmt && pnpm run lint:knip
              if: ${{ github.event_name == 'pull_request' }}

            - name: 🔍 Execute lint checks for all files (All)
              run: pnpm exec nx run-many -t lint:publint lint:knip lint:eslint lint:stylelint lint:markdownlint lint:oxfmt
              if: ${{ github.event_name == 'push' }}

            - name: 🧪 Execute unit test checks for affected files (Affected)
              # We disable the coverage threshold for PRs because affected will only run on the files
              # that have changed and the coverage will be lower than the threshold
              run: pnpm exec nx affected -t test:unit:coverage -- --coverage.thresholds.0
              if: ${{ github.event_name == 'pull_request' }}

            - name: 🧪 Execute unit test checks for all files (All)
              run: pnpm exec nx run-many -t test:unit:coverage
              if: ${{ github.event_name == 'push' }}

            - name: 🔍 Execute type test checks for affected files (Affected)
              run: pnpm exec nx affected -t test:types
              if: ${{ github.event_name == 'pull_request' }}

            - name: 🔍 Execute type test checks for all files (All)
              run: pnpm exec nx run-many -t test:types
              if: ${{ github.event_name == 'push' }}

            # Build an affected map consumed by the upload-codecov matrix job.
            # PR: only affected packages upload. Push: force all to true (baseline run).
            - name: 🔍 Detect affected packages for Codecov
              id: affected-codecov
              run: |
                  PACKAGES="react-hooks react-clean ts-configs ts-types http-client qup-api qup-data qup-domain solid-clean wealth-tracker-core green-beard qup-web wealth-react qup-shared"
                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                    AFFECTED_PROJECTS=$(pnpm exec nx show projects --affected)
                    echo "Affected projects:"
                    echo "$AFFECTED_PROJECTS"
                    JSON="{"
                    for package in $PACKAGES; do
                      if echo "$AFFECTED_PROJECTS" | grep -Fxq "@m0n0lab/$package"; then
                        JSON="$JSON\"$package\":true,"
                        echo "✓ $package is affected"
                      else
                        JSON="$JSON\"$package\":false,"
                        echo "⏭️  $package is not affected"
                      fi
                    done
                    JSON="${JSON%,}}"
                  else
                    # On push events upload all flags for full baseline.
                    JSON="{"
                    for package in $PACKAGES; do
                      JSON="$JSON\"$package\":true,"
                    done
                    JSON="${JSON%,}}"
                  fi
                  echo "json=$JSON" >> $GITHUB_OUTPUT
                  echo "Affected JSON: $JSON"

            # Upload lcov + junit artifacts for the downstream matrix job to consume.
            # Single small artifact (<2MB typically); retention 1 day is enough for the
            # follow-up job to download.
            - name: 📦 Upload coverage artifacts
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              if: ${{ !cancelled() }}
              with:
                  name: codecov-artifacts
                  path: |
                      packages/*/coverage/lcov.info
                      apps/*/coverage/lcov.info
                      packages/*/test-results.junit.xml
                      apps/*/test-results.junit.xml
                  if-no-files-found: warn
                  retention-days: 1

            - name: 🏗 Execute build checks
              # Builds all packages; Nx cache optimizes by skipping rebuild of non-affected packages.
              # CODECOV_TOKEN is propagated so app bundler plugins (@codecov/vite-plugin,
              # @codecov/sveltekit-plugin, @codecov/rollup-plugin) upload bundle stats during build.
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
              run: pnpm exec nx run-many -t build

            - name: 🧬 Execute mutation testing (All)
              run: pnpm exec nx run-many -t test:mutation
              if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') }}
              env:
                  STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}

            - name: Cache Stryker incremental results
              id: cache-stryker-save
              uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') }}
              with:
                  path: packages/*/reports/stryker-incremental.json
                  key: ${{ steps.cache-stryker-restore.outputs.cache-primary-key }}

            - name: 📊 Upload mutation reports as artifacts
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') }}
              with:
                  name: mutation-reports
                  path: packages/*/reports/mutation
                  retention-days: 30

            - name: 📦 Analyze and upload bundle sizes to Codecov
              continue-on-error: true
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
              run: |
                  # Analyze each published package
                  # Note: nx run-many with Nx cache avoids redundant rebuilds of non-affected packages
                  for package in react-hooks react-clean ts-configs ts-types http-client solid-clean qup-shared wealth-tracker-core; do
                    if [ -d "packages/$package/dist" ]; then
                      echo "📦 Analyzing bundle for $package..."
                      pnpm exec bundle-analyzer packages/$package/dist \
                        --bundle-name="$package" \
                        --upload-token="$CODECOV_TOKEN"
                    else
                      echo "⚠️  Skipping $package: dist directory not found"
                    fi
                  done

            - name: Cache Nx results
              id: cache-nx-save
              if: ${{ env.NX_NO_CLOUD == 'true' }}
              uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: .nx
                  key: ${{ steps.cache-nx-restore.outputs.cache-primary-key }}

    # Fan-out coverage + test-results uploads to Codecov.
    # One matrix entry per flag; the gate step skips entries not affected by the PR.
    # Single source of truth for the package list: this matrix block.
    upload-codecov:
        needs: main
        if: ${{ !cancelled() }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                package:
                    - { name: react-hooks, path: packages/react-hooks }
                    - { name: react-clean, path: packages/react-clean }
                    - { name: ts-configs, path: packages/ts-configs }
                    - { name: ts-types, path: packages/ts-types }
                    - { name: http-client, path: packages/http-client }
                    - { name: qup-api, path: apps/qup-api }
                    - { name: qup-data, path: packages/qup-data }
                    - { name: qup-domain, path: packages/qup-domain }
                    - { name: solid-clean, path: packages/solid-clean }
                    - { name: wealth-tracker-core, path: packages/wealth-tracker-core }
                    - { name: green-beard, path: apps/green-beard }
                    - { name: qup-web, path: apps/qup-web }
                    - { name: wealth-react, path: apps/wealth-react }
                    - { name: qup-shared, path: packages/qup-shared }
        steps:
            - name: Download coverage artifacts
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
              with:
                  name: codecov-artifacts

            - name: Gate by affected map
              id: gate
              run: |
                  AFFECTED='${{ needs.main.outputs.affected }}'
                  if [ -z "$AFFECTED" ] || [ "$AFFECTED" = "null" ]; then
                    # If the upstream job didn't emit the map (e.g. early failure),
                    # skip upload rather than crashing the matrix.
                    echo "should_upload=false" >> $GITHUB_OUTPUT
                    exit 0
                  fi
                  if echo "$AFFECTED" | jq -e '.["${{ matrix.package.name }}"] == true' > /dev/null; then
                    echo "should_upload=true" >> $GITHUB_OUTPUT
                  else
                    echo "should_upload=false" >> $GITHUB_OUTPUT
                  fi

            - name: 📊 Upload coverage to Codecov
              uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
              if: ${{ !cancelled() && steps.gate.outputs.should_upload == 'true' }}
              with:
                  files: ./${{ matrix.package.path }}/coverage/lcov.info
                  flags: ${{ matrix.package.name }}
                  token: ${{ secrets.CODECOV_TOKEN }}
                  fail_ci_if_error: false

            - name: 📊 Upload test results to Codecov
              uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
              if: ${{ !cancelled() && steps.gate.outputs.should_upload == 'true' }}
              with:
                  files: ./${{ matrix.package.path }}/test-results.junit.xml
                  flags: ${{ matrix.package.name }}
                  token: ${{ secrets.CODECOV_TOKEN }}
                  fail_ci_if_error: false
